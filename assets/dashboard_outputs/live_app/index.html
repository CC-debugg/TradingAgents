<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <!-- build: __DASHBOARD_VERSION__ -->
  <title>Strategy Tabs · LIVE · Production</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7a8899;
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff4466;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
      color: var(--accent);
      font-weight: 700;
    }
    header .meta { color: var(--muted); font-size: 0.8rem; }
    .actions { display: flex; gap: 8px; align-items: center; }
    button {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      cursor: pointer;
      font: inherit;
      border-radius: 4px;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: #0a3d4a; border-color: var(--accent); color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: wait; }
    label { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    main { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 72px); }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      nav { border-right: none; border-bottom: 1px solid var(--border); max-height: 180px; overflow-x: auto; display: flex; flex-direction: row; }
      .tab-btn { flex: 0 0 auto; min-width: 140px; }
    }
    nav {
      border-right: 1px solid var(--border);
      padding: 12px 8px;
      overflow-y: auto;
    }
    .tab-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 6px;
      padding: 10px 12px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid transparent;
    }
    .tab-btn.active {
      background: var(--panel);
      border-color: var(--accent);
      color: var(--accent);
    }
    .tab-btn .cat { font-size: 0.65rem; color: var(--muted); display: block; margin-top: 4px; }
    .tab-btn .badge {
      font-size: 0.6rem;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      background: #1f3d2a;
      color: var(--green);
    }
    .tab-btn .badge.off { background: #3d1f28; color: var(--red); }
    section.content { padding: 16px 20px; overflow: auto; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 1100px) { .grid2 { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .card h2 { margin: 0 0 8px; font-size: 0.95rem; color: var(--accent); }
    .card h3 { margin: 12px 0 6px; font-size: 0.8rem; color: var(--muted); font-weight: normal; }
    .stats { display: flex; flex-wrap: wrap; gap: 16px; font-size: 0.85rem; }
    .stats span b { color: var(--accent); }
    .desc { color: var(--muted); font-size: 0.8rem; line-height: 1.4; }
    canvas { width: 100%; height: 220px; display: block; }
    .factor-row {
      display: grid;
      grid-template-columns: 140px 1fr 48px;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 0.75rem;
    }
    .factor-bar {
      height: 10px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .factor-bar .pos {
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      background: var(--accent);
    }
    .factor-bar .neg {
      position: absolute;
      right: 50%;
      top: 0;
      height: 100%;
      background: var(--red);
    }
    .news li { margin: 8px 0; font-size: 0.78rem; color: var(--muted); }
    .news li a { color: var(--accent); text-decoration: none; }
    .signals { font-size: 0.8rem; }
    .signals code { color: var(--green); }
    #status { color: var(--muted); font-size: 0.75rem; }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 23, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: var(--accent);
    }
    .loading-overlay.show { display: flex; }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 1000px) { .asset-grid { grid-template-columns: 1fr; } }
    .asset-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      background: #12161c;
    }
    .asset-card h3 { margin: 0 0 8px; font-size: 0.85rem; color: var(--text); }
    .asset-card .venue { font-size: 0.65rem; color: var(--muted); }
    .asset-price { font-size: 1.25rem; color: var(--accent); margin: 6px 0; }
    .pill {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-right: 6px;
      margin-top: 4px;
    }
    .pill.trade { background: #1f3d2a; color: var(--green); }
    .pill.wait { background: #2a2418; color: #ffaa44; }
    .pill.flat { background: #21262d; color: var(--muted); }
    .pill.blocked, .pill.blocked_macro { background: #3d1f28; color: var(--red); }
    .pill.gated { background: #2a2418; color: #ffaa44; }
    .check-row { font-size: 0.72rem; margin: 4px 0; color: var(--muted); }
    .check-row.ok { color: var(--green); }
    .check-row.fail { color: #ff8866; }
    .flow-table { width: 100%; font-size: 0.72rem; border-collapse: collapse; margin-top: 8px; }
    .flow-table th, .flow-table td { border-bottom: 1px solid var(--border); padding: 4px 6px; text-align: right; }
    .flow-table th { color: var(--muted); text-align: left; }
    .whale-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .whale-grid { grid-template-columns: 1fr; } }
    .regime-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 800px) { .regime-grid { grid-template-columns: 1fr; } }
    .regime-card { border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-size: 0.75rem; }
    .regime-card.current { border-color: var(--green); }
    .alpha-tag { font-size: 0.6rem; background: #2a2418; color: #ffaa44; padding: 1px 5px; border-radius: 3px; }
    .wf-fold { font-size: 0.7rem; color: var(--muted); margin: 4px 0; }
    .module-toggle { cursor: pointer; color: var(--accent); font-size: 0.75rem; margin-left: 8px; }
    #stickyBar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #12161c;
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      font-size: 0.78rem;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    #stickyBar .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--panel);
      border: 1px solid var(--border);
      margin-right: 4px;
      font-size: 0.68rem;
    }
    #stickyBar .chip.green { border-color: var(--green); color: var(--green); }
    #stickyBar .chip.red { border-color: var(--red); color: var(--red); }
    .audit-table { width: 100%; font-size: 0.72rem; border-collapse: collapse; }
    .audit-table th, .audit-table td { border-bottom: 1px solid var(--border); padding: 5px 8px; text-align: right; }
    .audit-table th { color: var(--muted); text-align: left; }
    .corr-grid { display: grid; gap: 1px; font-size: 0.65rem; margin-top: 8px; }
    .corr-cell { padding: 4px; text-align: center; background: var(--panel); }
    .corr-head { color: var(--muted); font-size: 0.6rem; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="overlay">Loading live data…</div>
  <header>
    <div>
      <h1>PRODUCTION · whale + pairs · news-gated · v2.1</h1>
      <div class="meta" id="asOf">As of —</div>
    </div>
    <div class="actions">
      <label><input type="checkbox" id="autoRefresh" /> Auto 60s</label>
      <button type="button" id="btnRefresh" class="primary">Refresh now</button>
      <span id="status"></span>
    </div>
  </header>
  <div id="staleWarn" style="display:none;background:#3d1f28;color:#ff4466;padding:10px 20px;font-size:0.8rem;border-bottom:1px solid #30363d"></div>
  <div id="dataWarn" style="display:none;background:#2a2418;color:#ffaa44;padding:10px 20px;font-size:0.8rem;border-bottom:1px solid #30363d"></div>
  <div id="stickyBar" style="display:none"></div>
  <main>
    <nav id="tabs"></nav>
    <section class="content" id="panel">
      <p class="empty">Start server: <code>python scripts/serve_polymarket_live.py</code></p>
    </section>
  </main>
  <script>
    const API = "/api/live";
    const PROD_IDS = ["live_composite", "whale_flow", "pairs_stat_arb"];
    const BOOK_IDS = ["multi_strategy_index", "hf_manager_book"];
    const ALPHA_IDS = [
      "ts_momentum_meme",
      "cs_momentum_rank",
      "binance_poly_latency",
      "short_term_reversal",
      "poly_mean_reversion",
      "vol_risk_parity",
      "rl_tensortrade",
    ];
    const EXPECT_VERSION = "__DASHBOARD_VERSION__";
    let payload = null;
    let activeId = null;
    let autoTimer = null;

    const $ = (id) => document.getElementById(id);

    function isProdStrategy(s) {
      return s.live_production === true || PROD_IDS.includes(s.id);
    }

    function equalWeightLabel() {
      const a = payload && payload.allocation ? payload.allocation : {};
      return a.equal_weight_label || ("1/" + (a.n_base_sleeves || 8));
    }

    function visibleStrategies() {
      if (!payload || !payload.strategies) return [];
      const all = payload.strategies.filter((s) => s.runnable !== false);
      const catalogOrder = payload.catalog_ids || [];
      return all.sort((a, b) => {
        const order = ["live_composite", "multi_strategy_index", "hf_manager_book"];
        const ai = order.indexOf(a.id);
        const bi = order.indexOf(b.id);
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        const ci = catalogOrder.indexOf(a.id);
        const cj = catalogOrder.indexOf(b.id);
        if (ci >= 0 && cj >= 0) return ci - cj;
        if (ci >= 0) return -1;
        if (cj >= 0) return 1;
        const ap = PROD_IDS.includes(a.id) ? 1 : 0;
        const bp = PROD_IDS.includes(b.id) ? 1 : 0;
        return bp - ap;
      });
    }

    function checkStale(data) {
      const stale = (data.dashboard_version || "") !== EXPECT_VERSION;
      $("staleWarn").style.display = stale ? "block" : "none";
      if (stale) {
        $("staleWarn").innerHTML =
          "Server <b>" + (data.dashboard_version || "?") + "</b> ≠ UI <b>" + EXPECT_VERSION +
          "</b>. Run: <code>kill $(lsof -t -i:8765); python scripts/polymarket_meme_run.py live-app</code> then Cmd+Shift+R.";
      }
    }

    function checkDataWarn(data) {
      const el = $("dataWarn");
      const bad = (data.strategies || []).filter((s) => s.data_ok === false);
      if (data.data_stale) {
        el.style.display = "block";
        el.innerHTML =
          "Price feed blip — showing <b>last good snapshot</b>. Retry Refresh in 30s. " +
          (data.refresh_errors ? JSON.stringify(data.refresh_errors) : "");
        return;
      }
      if (bad.length) {
        el.style.display = "block";
        el.innerHTML =
          "Some data failed to load (cloud rate limit). Click <b>Refresh now</b> again. " +
          bad.map((s) => s.id + ": " + (s.data_error || "error")).join(" · ");
        return;
      }
      el.style.display = "none";
      el.innerHTML = "";
    }

    function fmtPct(x) {
      if (x == null || Number.isNaN(x)) return "—";
      return (x * 100).toFixed(1) + "%";
    }
    function fmtNum(x, d = 3) {
      if (x == null || Number.isNaN(x)) return "—";
      return (x >= 0 ? "+" : "") + Number(x).toFixed(d);
    }

    function setLoading(on) {
      $("overlay").classList.toggle("show", on);
      $("btnRefresh").disabled = on;
    }

    async function fetchLive() {
      setLoading(true);
      $("status").textContent = "Fetching…";
      const t0 = performance.now();
      try {
        const res = await fetch(API, { cache: "no-store" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        payload = data;
        checkStale(data);
        checkDataWarn(data);
        $("asOf").textContent =
          "As of " + data.as_of_ny + " · " + (data.dashboard_version || "?") +
          " · Universe: " + (data.universe || []).join(", ");
        renderStickyBar();
        if (data.dashboard_version && data.dashboard_version !== EXPECT_VERSION) {
          var k = "reload_" + data.dashboard_version;
          if (!sessionStorage.getItem(k)) {
            sessionStorage.setItem(k, "1");
            location.reload();
            return;
          }
        }
        renderTabs();
        activeId = "live_composite";
        const hasComposite = (data.strategies || []).some((s) => s.id === "live_composite");
        if (!hasComposite && data.strategies && data.strategies.length) {
          activeId = data.strategies[0].id;
        }
        if (activeId) renderStrategy(activeId);
        const ms = Math.round(performance.now() - t0);
        $("status").textContent = "Updated " + ms + "ms ago";
      } catch (e) {
        $("status").textContent = "Error: " + e.message;
        $("panel").innerHTML =
          '<p class="empty">Failed to load. Is <code>serve_polymarket_live.py</code> running?<br/>' +
          e.message + "</p>";
      } finally {
        setLoading(false);
      }
    }

    function renderTabs() {
      const nav = $("tabs");
      nav.innerHTML = "";
      if (!payload || !visibleStrategies().length) {
        nav.innerHTML = '<p class="empty">No strategies</p>';
        return;
      }
      const sorted = [...visibleStrategies()].sort((a, b) => {
        const order = ["live_composite", "multi_strategy_index", "hf_manager_book"];
        const ai = order.indexOf(a.id);
        const bi = order.indexOf(b.id);
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return (b.live_production ? 1 : 0) - (a.live_production ? 1 : 0);
      });
      sorted.forEach((s) => {
        if (s.id === ALPHA_IDS[0]) {
          const sep = document.createElement("div");
          sep.className = "desc";
          sep.style.cssText = "padding:8px 12px 4px;font-size:0.65rem;color:#7a8899";
          sep.textContent = "— α sleeves (HF literature) —";
          nav.appendChild(sep);
        }
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "tab-btn" + (s.id === activeId ? " active" : "");
        const wr = s.metrics && s.metrics.win_rate != null ? (s.metrics.win_rate * 100).toFixed(0) + "%" : "—";
        const prod = isProdStrategy(s);
        const badge = prod ? "PROD" : BOOK_IDS.includes(s.id) ? "BOOK" : "α";
        const badgeClass = prod ? "" : " off";
        btn.innerHTML =
          s.name +
          '<span class="badge' + badgeClass + '">' + badge + "</span>" +
          '<span class="cat">' + s.category + " · WR " + wr + "</span>";
        btn.onclick = () => {
          activeId = s.id;
          document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderStrategy(s.id);
        };
        nav.appendChild(btn);
      });
    }

    function drawEquity(canvas, equity) {
      const ctx = canvas.getContext("2d");
      const w = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
      const h = canvas.height = 220 * (window.devicePixelRatio || 1);
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
      const cw = canvas.clientWidth;
      const ch = 220;
      ctx.clearRect(0, 0, cw, ch);
      if (!equity || equity.length < 2) {
        ctx.fillStyle = "#7a8899";
        ctx.font = "12px monospace";
        ctx.fillText("Not enough equity points", 12, ch / 2);
        return;
      }
      const vals = equity.map((p) => p.v);
      const minV = Math.min(...vals) * 0.98;
      const maxV = Math.max(...vals) * 1.02;
      const pad = { l: 44, r: 12, t: 12, b: 28 };
      const plotW = cw - pad.l - pad.r;
      const plotH = ch - pad.t - pad.b;
      const last = vals[vals.length - 1];
      const color = last >= 1 ? "#00ff88" : "#ff4466";

      ctx.strokeStyle = "#30363d";
      ctx.lineWidth = 1;
      const y1 = pad.t + plotH * (1 - (1 - minV) / (maxV - minV || 1));
      ctx.beginPath();
      ctx.moveTo(pad.l, y1);
      ctx.lineTo(pad.l + plotW, y1);
      ctx.stroke();

      ctx.beginPath();
      equity.forEach((p, i) => {
        const x = pad.l + (i / (equity.length - 1)) * plotW;
        const y = pad.t + plotH * (1 - (p.v - minV) / (maxV - minV || 1));
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#7a8899";
      ctx.font = "10px monospace";
      ctx.fillText("Cumulative ($1 start)", pad.l, 10);
      ctx.fillText(maxV.toFixed(2), 4, pad.t + 8);
      ctx.fillText(minV.toFixed(2), 4, pad.t + plotH);
      ctx.fillText(equity[0].t, pad.l, ch - 6);
      ctx.fillText(equity[equity.length - 1].t, pad.l + plotW - 70, ch - 6);
    }

    function statusPill(status) {
      const s = status || "flat";
      const label =
        s === "trade"
          ? "TRADE"
          : s === "wait"
            ? "WAIT"
            : s === "blocked_macro"
              ? "MACRO OFF"
              : s === "gated"
                ? "GATED"
                : "FLAT";
      return '<span class="pill ' + s + '">' + label + "</span>";
    }

    function renderChecks(checks) {
      if (!checks || !checks.length) return "";
      return checks
        .map(function (c) {
          const cls = c.ok ? "ok" : "fail";
          return (
            '<div class="check-row ' +
            cls +
            '">' +
            (c.ok ? "✓" : "✗") +
            " " +
            c.label +
            " · <i>" +
            (c.value || "") +
            "</i></div>"
          );
        })
        .join("");
    }

    function renderAssetsLive() {
      const assets = payload.assets_live || [];
      if (!assets.length) return "";
      return (
        '<div class="card"><h2>Assets · live snapshot (on refresh)</h2>' +
        '<p class="desc">Latest prices &amp; whether we trade <b>now</b>. Tab metrics above are ' +
        (payload.lookback_days || "—") +
        "-day backtest.</p>" +
        '<div class="asset-grid">' +
        assets
          .map(function (a) {
            const px =
              a.price_pct != null
                ? a.price_pct + "% Yes"
                : a.price != null
                  ? "$" + Number(a.price).toLocaleString(undefined, { maximumFractionDigits: 6 })
                  : "—";
            const chg =
              a.chg_1d_pct != null
                ? (a.chg_1d_pct >= 0 ? "+" : "") + a.chg_1d_pct + "% 1d"
                : "";
            const blocks = (a.blocking || [])
              .map(function (b) {
                return "<li>" + b + "</li>";
              })
              .join("");
            return (
              '<div class="asset-card">' +
              "<h3>" +
              a.name +
              " [" +
              a.id +
              "]</h3>" +
              '<div class="venue">' +
              (a.venue || "") +
              (a.as_of ? " · as of " + a.as_of : "") +
              "</div>" +
              statusPill(a.status) +
              '<div class="asset-price">' +
              px +
              "</div>" +
              '<p class="desc">' +
              (chg ? chg + " · " : "") +
              (a.price_label || "") +
              "</p>" +
              "<p><b>Signal</b> raw <code>" +
              fmtNum(a.signal_raw, 2) +
              "</code> → gated <code>" +
              fmtNum(a.signal_gated, 2) +
              "</code>" +
              (a.gate_reason ? " (" + a.gate_reason + ")" : "") +
              "</p>" +
              '<p class="desc"><b>Trade when:</b> ' +
              (a.trade_when || "") +
              "</p>" +
              (a.spread_z != null ? '<p class="desc">Pairs z = <code>' + a.spread_z + "</code></p>" : "") +
              (blocks ? '<ul class="desc" style="margin:6px 0;padding-left:16px">' + blocks + "</ul>" : "") +
              "</div>"
            );
          })
          .join("") +
        "</div></div>"
      );
    }

    function renderWhaleDetail(whale) {
      if (!whale || whale.mode == null) return "";
      const daily = whale.daily_flow || [];
      const rows = daily
        .map(function (d) {
          return (
            "<tr><td>" +
            d.date +
            "</td><td>" +
            (d.n_trades || 0) +
            "</td><td>" +
            (d.flow_yes_usd != null ? "$" + Math.round(d.flow_yes_usd).toLocaleString() : "—") +
            "</td><td>" +
            (d.flow_no_usd != null ? "$" + Math.round(d.flow_no_usd).toLocaleString() : "—") +
            "</td><td>" +
            (d.flow_net_usd != null ? "$" + Math.round(d.flow_net_usd).toLocaleString() : "—") +
            "</td></tr>"
          );
        })

    function factorBars(factors) {
      if (!factors || !factors.length) return "<p class='desc'>No Barra attribution.</p>";
      const maxB = Math.max(0.01, ...factors.map((f) => Math.abs(f.beta)));
      return factors
        .map((f) => {
          const pct = Math.min(100, (Math.abs(f.beta) / maxB) * 50);
          const bar =
            f.beta >= 0
              ? '<div class="pos" style="width:' + pct + '%"></div>'
              : '<div class="neg" style="width:' + pct + '%"></div>';
          return (
            '<div class="factor-row"><span>' +
            (f.label || f.factor) +
            '</span><div class="factor-bar">' +
            bar +
            '</div><span>' +
            fmtNum(f.beta, 3) +

          );

        .join("");
    }

      const wf = s.walk_forward || {};
      const alphaWf =
        ALPHA_IDS.includes(id) && wf.n_folds
          ? (function () {
              const folds = (wf.folds || []).map(function (f) {
                return '<div class="wf-fold">' + f.test_start + " → " + f.test_end +
                  " · OOS Sharpe " + f.test_sharpe + " · ret " + fmtPct(f.test_return) + "</div>";
              }).join("");
              return '<div class="card"><h2>Walk-forward OOS</h2><div class="stats"><span>Folds <b>' +
                wf.n_folds + "</b></span><span>OOS Sharpe <b>" + fmtNum(wf.oos_sharpe, 2) +
                "</b></span></div>" + folds + "</div>";
            })()
          : "";
      const compositeAddons =
        id === "live_composite"
          ? renderTradeHistoryPanel() + renderPnLBanner() + renderRegimePanel() + renderAllocationTable() +
            renderAuditTable() + renderCorrHeatmap() + renderAlphaSleevesTable()
          : "";
      const prodTradeHistory =
        PROD_IDS.includes(id) && id !== "live_composite" ? renderTradeHistoryPanel() : "";
      const bookExtras = renderBookTabExtras(id);

      $("panel").innerHTML =
        '<div class="card">' +
        "<h2>" +
        s.name +
        " <span style='color:#7a8899;font-weight:normal'>[" +
        s.id +
        "]</span></h2>" +
        dataWarn +
        '<p class="desc">' +
        s.description +
        "</p>" +
        '<p class="desc"><i>' +
        s.reference +
        "</i></p>" +
        '<div class="stats">' +
        "<span>Win rate <b>" +
        fmtPct(m.win_rate) +
        "</b></span>" +
        "<span>Sharpe <b>" +
        fmtNum(m.sharpe) +
        "</b></span>" +
        "<span>Return (ann.) <b>" +
        fmtPct(m.cagr != null ? m.cagr : m.total_return) +
        "</b></span>" +
        "<span>Cum. return <b>" +
        fmtPct(m.total_return) +
        "</b></span>" +
        "<span>Max DD <b>" +
        fmtPct(m.max_dd) +
        "</b></span>" +
        "<span>R² Barra <b>" +
        (s.r2_barra != null ? s.r2_barra.toFixed(3) : "—") +
        "</b></span>" +
        "<span>Days <b>" +
        (s.n_days || "—") +
        "</b></span>" +
        "<span>WF OOS Sharpe <b>" +
        (wf.oos_sharpe != null ? wf.oos_sharpe : "—") +
        "</b></span>" +
        (m.vol_ann != null ? "<span>Vol (ann.) <b>" + fmtPct(m.vol_ann) + "</b></span>" : "") +
        (m.n_trades != null ? "<span>Trades <b>" + m.n_trades + "</b></span>" : "") +
        "</div></div>" +
        (PROD_IDS.includes(id) ? renderAssetsLive() : "") +
        '<div class="grid2">' +
        '<div class="card"><h2>Equity curve</h2>' +
        '<canvas id="eqChart"></canvas>' +
        "<p class='desc'>Source: live backtest · " +
        (s.start || "") +
        " → " +
        (s.end || "") +
        "</p></div>" +
        '<div class="card"><h2>MSCI Barra-style factor β (ETF proxy)</h2>' +
        factorBars(s.factors) +
        "</div></div>" +
        bookExtras +
        prodTradeHistory +
        compositeAddons +
        alphaWf +
        (PROD_IDS.includes(id)
          ? '<div class="card"><h2>When do we trade? (news gate)</h2>' +
            '<ol class="desc" style="line-height:1.6;margin:8px 0 8px 18px">' +
            "<li><b>Refresh</b> → ECB headlines (+ FRED if API key).</li>" +
            "<li><b>Macro score</b> [-1,1]: inflation/crisis/tightening → lower.</li>" +
            "<li><b>Score ≤ −0.35</b> → <span style='color:#ff4466'>block all new orders</span>.</li>" +
            "<li><b>Score −0.35…0</b> → half size.</li>" +
            "<li><b>Whale</b>: flow ≥ $12k, ≥4 trades, EMA agrees → POLY ±1.</li>" +
            "<li><b>Pairs</b>: |z|>2 → DOGE/WIF spread trade.</li>" +
            "<li><b>Regime</b>: Bridgewater/BlackRock + Ang&JPM tilt whale/pairs weights.</li>" +
            "<li>Use <b>Live composite</b> tab for the book we send to CLOB.</li></ol></div>" +
            renderWhaleDetail(whale) +
            '<div class="card"><h2>Pairs · detail</h2>' +
            '<div class="stats">' +
            "<span>z <b>" + (pairs.spread_z != null ? pairs.spread_z : "—") + "</b></span>" +
            "<span>DOGE <b>$" + (pairs.doge_price != null ? pairs.doge_price : "—") + "</b></span>" +
            "<span>WIF <b>$" + (pairs.wif_price != null ? pairs.wif_price : "—") + "</b></span>" +
            "<span>log(D/W) <b>" + (pairs.log_ratio != null ? pairs.log_ratio : "—") + "</b></span>" +
            "</div>" +
            renderChecks(pairs.checks) +
            "</div>" +
            '<div class="card signals"><h2>Production execution (news-gated)</h2>' +
            "<p>Macro gate <code style='color:" + gateColor + "'>" +
            (gate.label || "—") + " · score " + (gate.score != null ? gate.score : "—") +
            "</code></p>" +
            "<p>Whale v2 <code>" + (whale.signal != null ? whale.signal : "—") +
            "</code> · 7d flow $" + (whale.flow_net_usd != null ? Math.round(whale.flow_net_usd).toLocaleString() : "—") +
            " · vol $" + (whale.volume_usd != null ? Math.round(whale.volume_usd).toLocaleString() : "—") +
            " · trades " + (whale.n_trades != null ? whale.n_trades : "—") + "</p>" +
            "<p>Pairs z <code>" + (pairs.spread_z != null ? pairs.spread_z : "—") +
            "</code> · DOGE/WIF " + (pairs.doge_price != null ? "$" + pairs.doge_price : "—") +
            " / " + (pairs.wif_price != null ? "$" + pairs.wif_price : "—") + "</p>" +
            "<p><b>After gate:</b> POLY <code>" + (sig.POLY_GTA != null ? sig.POLY_GTA : "—") +
            "</code> (raw " + (raw.POLY_GTA != null ? raw.POLY_GTA : "—") +
            ", " + (reasons.POLY_GTA || "") + ") · DOGE <code>" +
            (sig.DOGE != null ? sig.DOGE : "—") + "</code> · WIF <code>" +
            (sig.WIF != null ? sig.WIF : "—") + "</code></p>" +
            "<p class='desc'>Production sleeve: " +
            (payload.production_strategies || []).join(", ") +
            " · α sleeves live: " + (payload.alpha_sleeves_live ? "yes" : "no") + "</p></div>" +
            renderVenueHealthCard() +
            renderSleeveIntentsTable() +
            '<div class="card"><h2>Macro news (ECB RSS' +
            (news.fred_api_configured ? " + FRED" : "") +
            ")</h2><ul class='news'>" +
            ecb.map(function (row) {
              return "<li><a href='" + (row.url || "#") + "' target='_blank' rel='noopener'>" + (row.title || "") + "</a></li>";
            }).join("") +
            fred.map(function (r) {
              return "<li>FRED " + (r.series_id || "") + ": " + (r.value != null ? r.value : "—") + " (" + (r.date || "") + ")</li>";
            }).join("") +
            "</ul></div>"
          : "");

      const canvas = document.getElementById("eqChart");
      if (canvas) drawEquity(canvas, s.equity);
    }

    $("btnRefresh").onclick = fetchLive;
    $("autoRefresh").onchange = () => {
      if (autoTimer) clearInterval(autoTimer);
      autoTimer = null;
      if ($("autoRefresh").checked) {
        autoTimer = setInterval(fetchLive, 60000);
      }
    };

    fetchLive();
  </script>
</body>
</html>
