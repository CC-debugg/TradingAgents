# Render.com — Web Service
# Dashboard: https://<your-service>.onrender.com/
services:
  - type: web
    name: polymarket-live-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-live-dashboard.txt
    startCommand: python scripts/serve_polymarket_live.py --public
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: POLYMARKET_LIVE
        value: "0"
      - key: HOST
        value: 0.0.0.0
      - key: LIVE_LOOKBACK_DAYS
        value: "250"
      - key: LIVE_MAX_TRADES
        value: "4000"
      - key: LIVE_CACHE_SECONDS
        value: "90"
      # Optional password: username:password
      # - key: DASHBOARD_BASIC_AUTH
      #   sync: false
